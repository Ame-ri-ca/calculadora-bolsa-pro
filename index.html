<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolsa PRO+ Cerebro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: #e5e7eb;
}

header {
    background: #0f172a;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #38bdf8;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid #1f2937;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}

.box {
    background: #111827;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid #1f2937;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #0f172a;
    color: #38bdf8;
    padding: 10px;
}

td {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid #1f2937;
}

.pos { color: #22c55e; font-weight: bold; }
.neg { color: #ef4444; font-weight: bold; }

.reco {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    background: #0f172a;
    border: 1px solid #1f2937;
}
</style>
</head>

<body>

<header>🧠 Bolsa PRO+ Cerebro</header>

<div class="container">

<div class="summary">
<div class="box">Valor Total<br><span id="total">$0</span></div>
<div class="box">P&L<br><span id="pl">$0</span></div>
<div class="box">Rendimiento<br><span id="perc">0%</span></div>
</div>

<div class="card">
<h3>➕ Agregar acción</h3>

<input id="ticker" placeholder="Ticker">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="precio" type="number" placeholder="Precio compra">
<input id="actual" type="number" placeholder="Precio actual">

<button onclick="agregar()">Agregar</button>
</div>

<div class="card">
<h3>📊 Portafolio</h3>
<table>
<thead>
<tr>
<th>Acción</th>
<th>Cant</th>
<th>Prom</th>
<th>Actual</th>
<th>P&L $</th>
<th>P&L %</th>
<th>Señal</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<div class="reco">
<h3>🧠 Recomendación</h3>
<div id="reco">Agrega acciones para analizar</div>
</div>

</div>

</div>

<script>

let portfolio = [];

function agregar() {
let t = document.getElementById("ticker").value;
let c = parseFloat(document.getElementById("cantidad").value);
let p = parseFloat(document.getElementById("precio").value);
let m = parseFloat(document.getElementById("actual").value);

if (!t || !c || !p || !m) return;

portfolio.push({t, c, p, m});
render();
}

function getSignal(plp) {
if (plp <= -10) return "🔴 Evitar";
if (plp <= -5) return "🟡 Vigilar";
return "🟢 OK";
}

function render() {

let tabla = document.getElementById("tabla");
tabla.innerHTML = "";

let totalValue = 0;
let totalCost = 0;

let best = null;
let worst = null;

portfolio.forEach(a => {

let value = a.c * a.m;
let cost = a.c * a.p;

let pl = value - cost;
let plp = (pl / cost) * 100;

totalValue += value;
totalCost += cost;

let signal = getSignal(plp);

let cls = pl >= 0 ? "pos" : "neg";

if (!best || plp > best.plp) best = {t: a.t, plp};
if (!worst || plp < worst.plp) worst = {t: a.t, plp};

tabla.innerHTML += `
<tr>
<td>${a.t}</td>
<td>${a.c}</td>
<td>$${a.p.toFixed(2)}</td>
<td>$${a.m.toFixed(2)}</td>
<td class="${cls}">$${pl.toFixed(2)}</td>
<td class="${cls}">${plp.toFixed(2)}%</td>
<td>${signal}</td>
</tr>
`;

});

let totalPL = totalValue - totalCost;
let totalPLP = (totalPL / totalCost) * 100;

document.getElementById("total").innerText = "$" + totalValue.toFixed(2);
document.getElementById("pl").innerText = "$" + totalPL.toFixed(2);
document.getElementById("perc").innerText = totalPLP.toFixed(2) + "%";

let recoText = "";

if (best && worst) {
recoText += `🥇 Mejor: ${best.t} (${best.plp.toFixed(2)}%)<br>`;
recoText += `⚠️ Más débil: ${worst.t} (${worst.plp.toFixed(2)}%)<br>`;

if (worst.plp < -5) {
recoText += `💡 Posible oportunidad de promediar en ${worst.t}`;
}
}

document.getElementById("reco").innerHTML = recoText;

}

</script>

</body>
</html>
