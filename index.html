<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Decision Filter</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: #e5e7eb;
}

header {
    background: #0f172a;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #38bdf8;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #1f2937;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    background: #0f172a;
    border: 1px solid #1f2937;
}

.green { color: #22c55e; font-weight: bold; }
.yellow { color: #facc15; font-weight: bold; }
.red { color: #ef4444; font-weight: bold; }
</style>
</head>

<body>

<header>🧠 Investment Decision Filter</header>

<div class="container">

<div class="card">

<h3>📊 Tu posición actual</h3>

<input id="ticker" placeholder="Ticker (ej: NVDA)">
<input id="shares" type="number" placeholder="Acciones actuales">
<input id="avg" type="number" placeholder="Precio promedio">
<input id="price" type="number" placeholder="Precio actual">
<input id="invest" type="number" placeholder="Dinero que quieres invertir">

<button onclick="analyze()">Analizar decisión</button>

<div id="out"></div>

</div>

</div>

<script>

function analyze() {

let t = document.getElementById("ticker").value;
let s = parseFloat(document.getElementById("shares").value);
let avg = parseFloat(document.getElementById("avg").value);
let price = parseFloat(document.getElementById("price").value);
let invest = parseFloat(document.getElementById("invest").value);

if (!t || !s || !avg || !price || !invest) return;

let currentPositionValue = s * price;

// exposición nueva
let exposure = (invest / currentPositionValue) * 100;

// nuevo promedio
let newShares = invest / price;
let totalShares = s + newShares;
let totalCost = (s * avg) + invest;
let newAvg = totalCost / totalShares;

// cambio en promedio
let improvement = ((avg - newAvg) / avg) * 100;

// riesgo de posición
let positionSize = (currentPositionValue / (currentPositionValue + invest)) * 100;

// clasificación de riesgo
let risk = "";

if (exposure > 50) risk = "🔴 Excesivo";
else if (exposure > 25) risk = "🟠 Alto";
else if (exposure > 10) risk = "🟡 Medio";
else risk = "🟢 Bajo";

// estado de posición
let sizeStatus = "";

if (positionSize > 70) sizeStatus = "🔴 Sobreconcentrada";
else if (positionSize > 40) sizeStatus = "🟠 Concentrada";
else if (positionSize > 20) sizeStatus = "🟡 Normal";
else sizeStatus = "🟢 Pequeña";

// veredicto final
let verdict = "";

if (risk === "🔴 Excesivo") {
verdict = "🔴 NO deberías aumentar (riesgo demasiado alto)";
}
else if (risk === "🟠 Alto" && improvement < 2) {
verdict = "🟡 Solo con alta convicción";
}
else if (improvement > 5 && risk !== "🔴 Excesivo") {
verdict = "🟢 Tiene sentido aumentar la posición";
}
else {
verdict = "🟡 Decisión opcional, sin ventaja clara";
}

document.getElementById("out").innerHTML = `
<div class="result">

<h3>📌 Resultado para ${t}</h3>

<p><b>Nueva media:</b> ${newAvg.toFixed(2)}</p>
<p><b>Mejora del promedio:</b> <span class="green">${improvement.toFixed(2)}%</span></p>

<p><b>Riesgo de la operación:</b> ${risk}</p>
<p><b>Estado de posición:</b> ${sizeStatus}</p>

<hr>

<p><b>VEREDICTO:</b> ${verdict}</p>

</div>
`;

}

</script>

</body>
</html>
