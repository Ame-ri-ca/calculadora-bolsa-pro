<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Risk Engine</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: #e5e7eb;
}

header {
    background: #0f172a;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #38bdf8;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #1f2937;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    color: #38bdf8;
    border-bottom: 1px solid #1f2937;
    padding: 10px;
}

td {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid #1f2937;
}

.result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    background: #0f172a;
    border: 1px solid #1f2937;
}

.green { color: #22c55e; font-weight: bold; }
.yellow { color: #facc15; font-weight: bold; }
.red { color: #ef4444; font-weight: bold; }
</style>
</head>

<body>

<header>🧠 Portfolio Risk Engine v1</header>

<div class="container">

<!-- PORTFOLIO -->
<div class="card">
<h3>📦 Añadir posición a cartera</h3>

<input id="ticker" placeholder="Ticker (ej: NVDA)">
<input id="shares" type="number" placeholder="Cantidad de acciones">
<input id="price" type="number" placeholder="Precio actual">

<button onclick="add()">Agregar a cartera</button>

<table>
<thead>
<tr>
<th>Acción</th>
<th>Valor</th>
<th>% Cartera</th>
</tr>
</thead>
<tbody id="portfolio"></tbody>
</table>
</div>

<!-- NUEVA COMPRA -->
<div class="card">
<h3>💰 Evaluar nueva compra</h3>

<input id="newTicker" placeholder="Ticker a evaluar">
<input id="newInvest" type="number" placeholder="Dinero a invertir">

<button onclick="analyze()">Analizar impacto</button>

<div id="output"></div>
</div>

</div>

<script>

let portfolio = [];

function add() {

let t = document.getElementById("ticker").value;
let s = parseFloat(document.getElementById("shares").value);
let p = parseFloat(document.getElementById("price").value);

if (!t || !s || !p) return;

portfolio.push({t, s, p});

render();
}

function render() {

let total = portfolio.reduce((acc, a) => acc + (a.s * a.p), 0);

let html = "";

portfolio.forEach(a => {
let value = a.s * a.p;
let percent = (value / total) * 100;

html += `
<tr>
<td>${a.t}</td>
<td>$${value.toFixed(2)}</td>
<td>${percent.toFixed(2)}%</td>
</tr>
`;
});

document.getElementById("portfolio").innerHTML = html;

}

function analyze() {

let t = document.getElementById("newTicker").value;
let invest = parseFloat(document.getElementById("newInvest").value);

if (!t || !invest || portfolio.length === 0) return;

let total = portfolio.reduce((acc, a) => acc + (a.s * a.p), 0);

// nueva exposición estimada
let newTotal = total + invest;

let newWeight = (invest / newTotal) * 100;

// concentración actual (mayor posición)
let maxWeight = 0;

portfolio.forEach(a => {
let w = (a.s * a.p) / total * 100;
if (w > maxWeight) maxWeight = w;
});

// impacto en riesgo
let risk = "";

if (newWeight > 30) {
risk = "🔴 Aumenta demasiado el riesgo (sobreconcentración)";
} else if (newWeight > 15) {
risk = "🟡 Impacto medio en cartera";
} else {
risk = "🟢 Riesgo controlado";
}

// veredicto
let verdict = "";

if (maxWeight > 40) {
verdict = "🔴 Ya estás concentrado → no es recomendable aumentar";
} else if (newWeight < 10) {
verdict = "🟢 Buena adición a la diversificación";
} else {
verdict = "🟡 Decisión neutral, depende de convicción";
}

document.getElementById("output").innerHTML = `
<div class="result">

<h3>📌 Resultado para ${t}</h3>

<p><b>Nuevo peso en cartera:</b> ${newWeight.toFixed(2)}%</p>

<p><b>Riesgo:</b> ${risk}</p>
<p><b>Veredicto:</b> ${verdict}</p>

</div>
`;

}

</script>

</body>
</html>
