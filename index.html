<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alfredo AI Investor</title>

<meta name="apple-mobile-web-app-title" content="Alfredo AI Investor">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1c">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: #e5e7eb;
}

header {
    background: #0f172a;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #38bdf8;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #1f2937;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.delete-btn {
    background: #ef4444;
    border: none;
    padding: 4px 8px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    color: #38bdf8;
    border-bottom: 1px solid #1f2937;
    padding: 10px;
}

td {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid #1f2937;
}

.result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    background: #0f172a;
    border: 1px solid #1f2937;
}

.green { color: #22c55e; font-weight: bold; }
.yellow { color: #facc15; font-weight: bold; }
.red { color: #ef4444; font-weight: bold; }
</style>

</head>

<body>

<header>🧠 Alfredo AI Investor</header>

<div class="container">

<!-- CARTERA -->
<div class="card">
<h3>📦 Portafolio</h3>

<input id="ticker" placeholder="Ticker">
<input id="shares" type="number" placeholder="Acciones">
<input id="buy" type="number" placeholder="Precio de compra">
<input id="price" type="number" placeholder="Precio actual">

<button onclick="add()">Agregar posición</button>

<table>
<thead>
<tr>
<th>Acción</th>
<th>Valor</th>
<th>Resultado</th>
<th>Señal</th>
<th></th>
</tr>
</thead>
<tbody id="portfolio"></tbody>
</table>
</div>

<!-- DECISIÓN -->
<div class="card">
<h3>💰 Decisión de inversión</h3>

<input id="newTicker" placeholder="Ticker">
<input id="newInvest" type="number" placeholder="Monto a invertir">

<button onclick="analyze()">Analizar decisión</button>

<div id="output"></div>
</div>

</div>

<script>

let portfolio = [];

function add() {

let t = document.getElementById("ticker").value;
let s = parseFloat(document.getElementById("shares").value);
let buy = parseFloat(document.getElementById("buy").value);
let price = parseFloat(document.getElementById("price").value);

if (!t || !s || !buy || !price) return;

portfolio.push({t, s, buy, price});

render();
}

function remove(index) {
portfolio.splice(index, 1);
render();
}

function render() {

let html = "";

portfolio.forEach((a, i) => {

let value = a.s * a.price;
let result = ((a.price - a.buy) / a.buy) * 100;

let signal = "";

if (result > 10) signal = "🟢 Fortaleza";
else if (result < -10) signal = "🔴 Debilidad";
else signal = "🟡 Neutral";

html += `
<tr>
<td>${a.t}</td>
<td>$${value.toFixed(2)}</td>
<td class="${result >= 0 ? 'green' : 'red'}">${result.toFixed(2)}%</td>
<td>${signal}</td>
<td><button class="delete-btn" onclick="remove(${i})">X</button></td>
</tr>
`;

});

document.getElementById("portfolio").innerHTML = html;

}

function analyze() {

let t = document.getElementById("newTicker").value;
let invest = parseFloat(document.getElementById("newInvest").value);

if (!t || !invest) return;

// total cartera
let totalValue = portfolio.reduce((a,b)=>a + (b.s * b.price), 0);

// riesgo
let weight = (invest / (totalValue + invest)) * 100;

// promedio real
let totalShares = portfolio.reduce((a,b)=>a + b.s, 0);
let totalCost = portfolio.reduce((a,b)=>a + (b.s * b.buy), 0);

if (totalShares === 0) {
document.getElementById("output").innerHTML =
`<div class="result">⚠️ Agrega posiciones primero</div>`;
return;
}

let avgPrice = totalCost / totalShares;

// simulación real
let newShares = invest / avgPrice;
let newAvg = (totalCost + invest) / (totalShares + newShares);

let improvement = ((avgPrice - newAvg) / avgPrice) * 100;

// decisión real
let decision = "";

if (improvement > 2 && weight < 25) {
decision = "🟢 DECISIÓN POSITIVA: mejora tu posición";
}
else if (improvement > 0 && weight < 35) {
decision = "🟡 DECISIÓN NEUTRA: mejora leve";
}
else if (improvement <= 0) {
decision = "🔴 DECISIÓN NEGATIVA: empeora tu promedio";
}
else if (weight > 35) {
decision = "🔴 RIESGO ALTO: concentración excesiva";
}
else {
decision = "🟡 SIN SEÑAL CLARA";
}

document.getElementById("output").innerHTML = `
<div class="result">

<h3>${t}</h3>

<p><b>Promedio actual:</b> ${avgPrice.toFixed(2)}</p>
<p><b>Nuevo promedio:</b> ${newAvg.toFixed(2)}</p>
<p><b>Mejora:</b> ${improvement.toFixed(2)}%</p>
<p><b>Riesgo:</b> ${weight.toFixed(2)}%</p>

<hr>

<p><b>DECISIÓN:</b> ${decision}</p>

</div>
`;

}

</script>

</body>
</html>
