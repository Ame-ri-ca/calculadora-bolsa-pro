<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolsa PRO+ Impacto Real</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: #e5e7eb;
}

header {
    background: #0f172a;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #38bdf8;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid #1f2937;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #22c55e;
    color: white;
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #0f172a;
    color: #38bdf8;
    padding: 10px;
}

td {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid #1f2937;
}

.pos { color: #22c55e; font-weight: bold; }
.neg { color: #ef4444; font-weight: bold; }

.box {
    background: #111827;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    border: 1px solid #1f2937;
}
</style>
</head>

<body>

<header>📊 Bolsa PRO+ Impacto Real</header>

<div class="container">

<div class="card">
<h3>➕ Agregar acción</h3>

<input id="ticker" placeholder="Ticker">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="precio" type="number" placeholder="Precio compra">
<input id="actual" type="number" placeholder="Precio actual">

<button onclick="agregar()">Agregar</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Acción</th>
<th>Posición</th>
<th>P&L</th>
<th>Impacto si compras +10%</th>
<th>Decisión</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<script>

let portfolio = [];

function agregar() {
let t = document.getElementById("ticker").value;
let c = parseFloat(document.getElementById("cantidad").value);
let p = parseFloat(document.getElementById("precio").value);
let m = parseFloat(document.getElementById("actual").value);

if (!t || !c || !p || !m) return;

portfolio.push({t, c, p, m});
render();
}

function decisionImpact(actualPLP, newPLP) {

let diff = newPLP - actualPLP;

if (diff > 2) return "🟢 Mejora tu posición (promediar ayuda)";
if (diff > -2) return "🟡 Impacto neutro";
return "🔴 Empeora tu promedio";
}

function render() {

let tabla = document.getElementById("tabla");
tabla.innerHTML = "";

portfolio.forEach(a => {

let value = a.c * a.m;
let cost = a.c * a.p;

let pl = value - cost;
let plp = (pl / cost) * 100;

// simular compra +10%
let newQty = a.c * 1.1;
let newCost = (a.c * a.p) + (a.c * 0.1 * a.m);
let newAvg = newCost / newQty;

let newValue = newQty * a.m;
let newPL = newValue - newCost;
let newPLP = (newPL / newCost) * 100;

let impact = decisionImpact(plp, newPLP);

let cls = pl >= 0 ? "pos" : "neg";

tabla.innerHTML += `
<tr>
<td>${a.t}</td>
<td>${a.c}</td>
<td class="${cls}">${plp.toFixed(2)}%</td>
<td>${newPLP.toFixed(2)}%</td>
<td>${impact}</td>
</tr>
`;

});

}

</script>

</body>
</html>
