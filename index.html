<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Risk Engine Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: #e5e7eb;
}

header {
    background: #0f172a;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #38bdf8;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #1f2937;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    color: #38bdf8;
    border-bottom: 1px solid #1f2937;
    padding: 10px;
}

td {
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid #1f2937;
}

.result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    background: #0f172a;
    border: 1px solid #1f2937;
}

.green { color: #22c55e; font-weight: bold; }
.yellow { color: #facc15; font-weight: bold; }
.red { color: #ef4444; font-weight: bold; }
</style>
</head>

<body>

<header>🧠 Portfolio Risk Engine Pro</header>

<div class="container">

<!-- CARTERA -->
<div class="card">
<h3>📦 Añadir posición</h3>

<input id="ticker" placeholder="Ticker">
<input id="shares" type="number" placeholder="Acciones">
<input id="buy" type="number" placeholder="Precio de compra">
<input id="price" type="number" placeholder="Precio actual">

<button onclick="add()">Agregar</button>

<table>
<thead>
<tr>
<th>Acción</th>
<th>Valor</th>
<th>Ganancia %</th>
<th>Señal</th>
</tr>
</thead>
<tbody id="portfolio"></tbody>
</table>
</div>

<!-- ANALISIS -->
<div class="card">
<h3>💰 Evaluar nueva inversión</h3>

<input id="newTicker" placeholder="Ticker a evaluar">
<input id="newInvest" type="number" placeholder="Dinero a invertir">

<button onclick="analyze()">Analizar</button>

<div id="output"></div>
</div>

</div>

<script>

let portfolio = [];

function add() {

let t = document.getElementById("ticker").value;
let s = parseFloat(document.getElementById("shares").value);
let buy = parseFloat(document.getElementById("buy").value);
let price = parseFloat(document.getElementById("price").value);

if (!t || !s || !buy || !price) return;

portfolio.push({t, s, buy, price});

render();
}

function render() {

let html = "";

portfolio.forEach(a => {

let value = a.s * a.price;
let profit = ((a.price - a.buy) / a.buy) * 100;

let signal = "";

if (profit <= -15) signal = "🟢 BUY (promediar)";
else if (profit >= 20) signal = "🔴 SELL (posible toma de ganancias)";
else signal = "🟡 HOLD";

html += `
<tr>
<td>${a.t}</td>
<td>$${value.toFixed(2)}</td>
<td class="${profit >= 0 ? 'green' : 'red'}">${profit.toFixed(2)}%</td>
<td>${signal}</td>
</tr>
`;

});

document.getElementById("portfolio").innerHTML = html;

}

function analyze() {

let t = document.getElementById("newTicker").value;
let invest = parseFloat(document.getElementById("newInvest").value);

if (!t || !invest) return;

let total = portfolio.reduce((acc, a) => acc + (a.s * a.price), 0);

let weight = (invest / (total + invest)) * 100;

let risk = "";

if (weight > 30) risk = "🔴 Alta concentración";
else if (weight > 15) risk = "🟡 Riesgo medio";
else risk = "🟢 Riesgo controlado";

let decision = "";

if (weight > 30) {
decision = "❌ No recomendado (sobreconcentración)";
} else if (weight < 10) {
decision = "🟢 Buena adición al portafolio";
} else {
decision = "🟡 Neutral, depende de convicción";
}

document.getElementById("output").innerHTML = `
<div class="result">

<h3>📌 ${t}</h3>

<p><b>Peso en cartera:</b> ${weight.toFixed(2)}%</p>
<p><b>Riesgo:</b> ${risk}</p>
<p><b>Decisión:</b> ${decision}</p>

</div>
`;

}

</script>

</body>
</html>
