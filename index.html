<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolsa PRO+</title>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

h1 {
    text-align: center;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #334155;
    text-align: center;
}

.summary {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    margin-bottom: 15px;
}

.box {
    background: #1e293b;
    padding: 10px;
    border-radius: 8px;
    flex: 1;
    margin: 5px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Bolsa PRO+</h1>

<div class="summary">
<div class="box">Valor total: <div id="total">$0</div></div>
<div class="box">Ganancia/Pérdida: <div id="pl">$0</div></div>
<div class="box">% Rendimiento: <div id="perc">0%</div></div>
</div>

<div class="card">
<h3>Agregar acción</h3>

<input id="ticker" placeholder="Ticker (NVDA, TSLA...)">
<input id="cantidad" placeholder="Cantidad" type="number">
<input id="precio" placeholder="Precio promedio compra" type="number">
<input id="actual" placeholder="Precio actual" type="number">

<button onclick="agregar()">Agregar</button>
</div>

<table>
<thead>
<tr>
<th>Acción</th>
<th>Cant.</th>
<th>Promedio</th>
<th>Actual</th>
<th>P&L $</th>
<th>P&L %</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

let portfolio = [];

function agregar() {

let t = document.getElementById("ticker").value;
let c = parseFloat(document.getElementById("cantidad").value);
let p = parseFloat(document.getElementById("precio").value);
let m = parseFloat(document.getElementById("actual").value);

if (!t || !c || !p || !m) return;

portfolio.push({t, c, p, m});
render();
}

function render() {

let tabla = document.getElementById("tabla");
tabla.innerHTML = "";

let totalValue = 0;
let totalCost = 0;

portfolio.forEach(a => {

let value = a.c * a.m;
let cost = a.c * a.p;

let pl = value - cost;
let plp = (pl / cost) * 100;

totalValue += value;
totalCost += cost;

tabla.innerHTML += `
<tr>
<td>${a.t}</td>
<td>${a.c}</td>
<td>$${a.p.toFixed(2)}</td>
<td>$${a.m.toFixed(2)}</td>
<td>$${pl.toFixed(2)}</td>
<td>${plp.toFixed(2)}%</td>
</tr>
`;
});

let totalPL = totalValue - totalCost;
let totalPLP = (totalPL / totalCost) * 100;

document.getElementById("total").innerText = "$" + totalValue.toFixed(2);
document.getElementById("pl").innerText = "$" + totalPL.toFixed(2);
document.getElementById("perc").innerText = totalPLP.toFixed(2) + "%";
}

</script>

</body>
</html>
