<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Decision System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: #e5e7eb;
}

header {
    background: #0f172a;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #38bdf8;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid #1f2937;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.result {
    background: #0f172a;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
    border: 1px solid #1f2937;
}

.green { color: #22c55e; font-weight: bold; }
.yellow { color: #facc15; font-weight: bold; }
.red { color: #ef4444; font-weight: bold; }

.small {
    font-size: 13px;
    opacity: 0.85;
}
</style>
</head>

<body>

<header>🧠 Investment Decision System</header>

<div class="container">

<div class="card">
<h3>📊 Datos de tu posición</h3>

<input id="ticker" placeholder="Ticker (ej: NVDA)">
<input id="shares" type="number" placeholder="Acciones actuales">
<input id="avg" type="number" placeholder="Precio promedio">
<input id="price" type="number" placeholder="Precio actual">
<input id="invest" type="number" placeholder="Cuánto quieres invertir ($)">

<button onclick="analyze()">Analizar decisión</button>

<div id="output"></div>
</div>

</div>

<script>

function analyze() {

let t = document.getElementById("ticker").value;
let s = parseFloat(document.getElementById("shares").value);
let avg = parseFloat(document.getElementById("avg").value);
let price = parseFloat(document.getElementById("price").value);
let invest = parseFloat(document.getElementById("invest").value);

if (!t || !s || !avg || !price || !invest) return;

let currentValue = s * price;
let currentCost = s * avg;

// nuevas acciones que podrías comprar
let newShares = invest / price;

// nueva posición
let totalShares = s + newShares;
let totalCost = currentCost + invest;
let newAvg = totalCost / totalShares;

// impacto en promedio
let avgChange = ((avg - newAvg) / avg) * 100;

// riesgo simple (exposición adicional)
let exposure = invest / currentValue * 100;

// lógica de decisión
let riskSignal = "";

if (exposure > 50) {
riskSignal = "🔴 Riesgo alto: aumentas demasiado tu exposición";
} else if (exposure > 20) {
riskSignal = "🟡 Riesgo medio: impacto notable en tu portafolio";
} else {
riskSignal = "🟢 Riesgo controlado";
}

// evaluación de oportunidad (basado en tu regla -15% / +20%)
let marketSignal = "";

let change = ((price - avg) / avg) * 100;

if (change <= -15) {
marketSignal = "🟢 Zona de oportunidad (caída fuerte - posible promediado)";
} else if (change >= 20) {
marketSignal = "🟠 Precio alto (posible toma de ganancias)";
} else {
marketSignal = "⚪ Zona neutral";
}

// decisión combinada
let decision = "";

if (exposure > 50) {
decision = "❌ No recomendable (riesgo excesivo)";
} else if (change <= -15 && exposure <= 20) {
decision = "🟢 Buena oportunidad de entrada controlada";
} else if (change >= 20) {
decision = "🟠 Considerar reducir / esperar";
} else {
decision = "⚪ Mantener o decisión opcional";
}

document.getElementById("output").innerHTML = `
<div class="result">
<h3>📌 Resultado para ${t}</h3>

<p><b>Nueva media:</b> ${newAvg.toFixed(2)}</p>
<p><b>Cambio en promedio:</b> <span class="green">${avgChange.toFixed(2)}%</span></p>
<p><b>Exposición adicional:</b> <span class="yellow">${exposure.toFixed(2)}%</span></p>

<p class="small">${riskSignal}</p>
<p class="small">${marketSignal}</p>

<p><b>DECISIÓN:</b> ${decision}</p>
</div>
`;

}

</script>

</body>
</html>
