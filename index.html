<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Matrix Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: #e5e7eb;
}

header {
    background: #0f172a;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #38bdf8;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #1f2937;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    background: #0f172a;
    border: 1px solid #1f2937;
}

.table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
}

td, th {
    border-bottom: 1px solid #1f2937;
    padding: 10px;
    text-align: center;
}

th {
    color: #38bdf8;
}

.green { color: #22c55e; font-weight: bold; }
.yellow { color: #facc15; font-weight: bold; }
.red { color: #ef4444; font-weight: bold; }
</style>
</head>

<body>

<header>🧠 Decision Matrix Pro</header>

<div class="container">

<div class="card">
<h3>📊 Datos de tu posición</h3>

<input id="ticker" placeholder="Ticker">
<input id="shares" type="number" placeholder="Acciones actuales">
<input id="avg" type="number" placeholder="Precio promedio">
<input id="price" type="number" placeholder="Precio actual">

<button onclick="run()">Analizar escenarios</button>

<div id="out"></div>

</div>

</div>

<script>

function evaluate(change, risk) {

if (risk > 40) return "🔴 Demasiado riesgo";
if (change > 5) return "🟢 Buena mejora";
if (change > 1) return "🟡 Mejora leve";
return "⚪ Impacto bajo";
}

function scenario(shares, avg, price, invest) {

let newShares = invest / price;
let totalShares = shares + newShares;

let cost = shares * avg;
let newCost = cost + invest;

let newAvg = newCost / totalShares;

let change = ((avg - newAvg) / avg) * 100;

let exposure = (invest / (shares * price)) * 100;

let evalText = evaluate(change, exposure);

return {
invest,
newAvg,
change,
exposure,
evalText
};
}

function run() {

let t = document.getElementById("ticker").value;
let s = parseFloat(document.getElementById("shares").value);
let avg = parseFloat(document.getElementById("avg").value);
let price = parseFloat(document.getElementById("price").value);

if (!t || !s || !avg || !price) return;

let s1 = scenario(s, avg, price, 1000);
let s2 = scenario(s, avg, price, 3000);
let s3 = scenario(s, avg, price, 7000);

document.getElementById("out").innerHTML = `
<div class="result">
<h3>📌 Escenarios para ${t}</h3>

<table class="table">
<tr>
<th>Inversión</th>
<th>Nueva media</th>
<th>Mejora %</th>
<th>Riesgo</th>
<th>Evaluación</th>
</tr>

<tr>
<td>$1,000</td>
<td>${s1.newAvg.toFixed(2)}</td>
<td class="green">${s1.change.toFixed(2)}%</td>
<td>${s1.exposure.toFixed(2)}%</td>
<td>${s1.evalText}</td>
</tr>

<tr>
<td>$3,000</td>
<td>${s2.newAvg.toFixed(2)}</td>
<td class="green">${s2.change.toFixed(2)}%</td>
<td>${s2.exposure.toFixed(2)}%</td>
<td>${s2.evalText}</td>
</tr>

<tr>
<td>$7,000</td>
<td>${s3.newAvg.toFixed(2)}</td>
<td class="green">${s3.change.toFixed(2)}%</td>
<td>${s3.exposure.toFixed(2)}%</td>
<td>${s3.evalText}</td>
</tr>
</table>

</div>
`;

}

</script>

</body>
</html>
