<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alfredo AI Investor</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1c;
    color: white;
}

header {
    padding: 15px;
    background: #0f172a;
    text-align: center;
    font-weight: bold;
    color: #38bdf8;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    background: #1f2937;
    border: none;
    color: white;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 10px;
    background: #22c55e;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

.result {
    margin-top: 10px;
    padding: 10px;
    background: #0f172a;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>🧠 Alfredo AI Investor</header>

<div class="container">

<div class="card">
<h3>📊 Portafolio</h3>

<input id="ticker" placeholder="Ticker">
<input id="shares" type="number" placeholder="Acciones">
<input id="buy" type="number" placeholder="Precio compra">
<input id="price" type="number" placeholder="Precio actual">

<button onclick="add()">Agregar</button>

<div id="list"></div>
</div>

</div>

<script>

let portfolio = [];

function add() {

let t = document.getElementById("ticker").value;
let s = parseFloat(document.getElementById("shares").value);
let b = parseFloat(document.getElementById("buy").value);
let p = parseFloat(document.getElementById("price").value);

if (!t || !s || !b || !p) return;

portfolio.push({t, s, b, p});
render();
}

function render() {

let html = "";

portfolio.forEach(a => {

let invested = a.s * a.b;
let current = a.s * a.p;
let diff = current - invested;
let pct = (diff / invested) * 100;

let color = diff >= 0 ? "green" : "red";

html += `
<div class="result">
<p><b>${a.t}</b></p>
<p>Invertido: $${invested.toFixed(2)}</p>
<p>Actual: $${current.toFixed(2)}</p>
<p class="${color}">Ganancia/Pérdida: $${diff.toFixed(2)} (${pct.toFixed(2)}%)</p>
</div>
`;
});

document.getElementById("list").innerHTML = html;
}

</script>

</body>
</html>
